<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - Videobelajar</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* ===== RESET & VARIABLES ===== */
    :root {
      --primary: #3ecf4c;
      --primary-dark: #2fb83a;
      --secondary: #f3a933;
      --accent: #f9f7f3;
      --text-main: #1a1a2e;
      --text-muted: #6b7280;
      --white: #ffffff;
      --border-color: #e5e2db;
      --shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #fffcf5; /* Krem halus khas VideoBelajar */
      color: var(--text-main);
      line-height: 1.6;
    }

    /* ===== HEADER ===== */
    header {
      background: var(--white);
      padding: 20px 5%;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo .brand-1 { color: var(--secondary); }
    .logo .brand-2 { color: #e66b27; }

    /* ===== MAIN CONTAINER ===== */
    .main-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--white);
      width: 100%;
      max-width: 520px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.02);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== FORM STYLES ===== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-group label span {
      color: #ff4d4d;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: #fafaf8;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(62, 207, 76, 0.1);
    }

    /* Custom Phone Input */
    .phone-row {
      display: flex;
      gap: 10px;
    }

    .country-code {
      background: #f1f1ee;
      padding: 0 15px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      border: 1.5px solid var(--border-color);
    }

    .flag {
      width: 20px;
      height: 14px;
      background: linear-gradient(#f00 50%, #fff 50%); /* Flag Indonesia */
      border: 1px solid #ddd;
    }

    /* ===== BUTTONS ===== */
    .btn-container {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      text-decoration: none;
      text-align: center;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(62, 207, 76, 0.3);
    }

    .btn-secondary {
      background: #e8fae9;
      color: var(--primary-dark);
    }

    .btn-secondary:hover {
      background: #d4f5d7;
    }

    /* Google Button */
    .btn-google {
      background: var(--white);
      border: 1.5px solid var(--border-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: var(--accent);
    }

    /* Divider */
    .divider {
      text-align: center;
      margin: 20px 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--border-color);
      z-index: 1;
    }

    .divider span {
      background: var(--white);
      padding: 0 15px;
      position: relative;
      z-index: 2;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .auth-card {
        padding: 30px 20px;
        box-shadow: none;
        background: transparent;
      }
      header {
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo"><span class="brand-1">video</span><span class="brand-2">belajar</span></a>
  </header>

  <main class="main-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Pendaftaran Akun</h1>
        <p>Bergabunglah dengan ribuan siswa lainnya hari ini!</p>
      </div>

      <form action="#">
        <div class="form-group">
          <label>Nama Lengkap <span>*</span></label>
          <input type="text" placeholder="Contoh: Fadhlan Khalqi" required>
        </div>

        <div class="form-group">
          <label>E-Mail <span>*</span></label>
          <input type="email" placeholder="fadhlan@example.com" required>
        </div>

        <div class="form-group">
          <label>Jenis Kelamin <span>*</span></label>
          <select required>
            <option value="" disabled selected>Pilih Jenis Kelamin</option>
            <option value="L">Laki-laki</option>
            <option value="P">Perempuan</option>
          </select>
        </div>

        <div class="form-group">
          <label>No. Hp <span>*</span></label>
          <div class="phone-row">
            <div class="country-code">
              <div class="flag"></div>
              <span>+62</span>
            </div>
            <input type="tel" placeholder="81234567890" required>
          </div>
        </div>

        <div class="form-group">
          <label>Kata Sandi <span>*</span></label>
          <input type="password" placeholder="Minimal 8 karakter" required>
        </div>

        <div class="form-group">
          <label>Konfirmasi Kata Sandi <span>*</span></label>
          <input type="password" placeholder="Ulangi kata sandi" required>
        </div>

        <div class="btn-container">
          <button type="submit" class="btn btn-primary">Daftar Sekarang</button>
          <a href="#" class="btn btn-secondary">Sudah Punya Akun? Masuk</a>
        </div>
      </form>

      <div class="divider">
        <span>atau</span>
      </div>

      <button class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
            <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91a8.78 8.78 0 0 0 2.69-6.6z" fill="#4285F4" />
            <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.32-1.58-5.03-3.7H.95v2.3A8.99 8.99 0 0 0 9 18z" fill="#34A853" />
            <path d="M3.97 10.72c-.18-.54-.28-1.12-.28-1.72s.1-1.18.28-1.72V5l-3.02-2.3A8.99 8.99 0 0 0 0 9c0 2.12.74 4.07 1.97 5.61l3-2.3z" fill="#FBBC05" />
            <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.45A8.96 8.96 0 0 0 9 0 8.99 8.99 0 0 0 .95 5l3.02 2.3c.71-2.11 2.69-3.71 5.03-3.71z" fill="#EA4335" />
          </svg>
        Daftar dengan Google
      </button>
    </div>
  </main>

</body>
</html>
